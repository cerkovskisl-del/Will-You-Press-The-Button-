<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Press The Button? | Ultimate Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #a0aec0;
            --box-bg: #f8fafc;
            --box-border: #e2e8f0;
            --btn-disabled-bg: #edf2f7;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --box-bg: #0f172a;
            --box-border: #334155;
            --btn-disabled-bg: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            max-width: 680px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
        }

        .streak-counter {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: none;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: var(--text-main);
        }

        @keyframes cardPop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 20px 60px var(--shadow);
            padding: 50px 40px;
            width: 100%;
            max-width: 680px;
            text-align: center;
            position: relative;
        }

        .animate-card {
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .dilemma-box {
            background: var(--box-bg);
            border-radius: 20px;
            padding: 30px;
            border: 2px dashed var(--box-border);
            margin-bottom: 40px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dilemma-text {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-wrapper {
            position: relative;
            border-radius: 20px;
        }

        .wrapper-yes { background: #2f855a; }
        .wrapper-no { background: #c53030; }

        .btn {
            width: 100%;
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 20px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transform: translateY(-6px);
            transition: transform 0.1s ease, background-color 0.2s ease, color 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            outline: none;
        }

        .btn-yes { background-color: #48bb78; color: white; }
        .btn-no { background-color: #f56565; color: white; }

        .btn-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: rgba(0, 0, 0, 0.08);
            transition: width 0.8s cubic-bezier(0.1, 0.8, 0.3, 1);
            z-index: 1;
        }

        [data-theme="dark"] .btn-progress {
            background-color: rgba(255, 255, 255, 0.06);
        }

        .btn span {
            position: relative;
            z-index: 2;
        }

        .btn:active:not(.disabled) {
            transform: translateY(-2px);
        }

        .percent {
            font-size: 1.5rem;
            font-weight: 900;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .revealed .btn {
            pointer-events: none;
            transform: translateY(0);
        }
        
        .revealed .btn-wrapper {
            background: transparent;
        }

        .revealed .btn-yes { background-color: var(--btn-disabled-bg); color: #48bb78; }
        .revealed .btn-no { background-color: var(--btn-disabled-bg); color: #f56565; }

        .revealed .btn.selected {
            box-shadow: inset 0 0 0 4px var(--text-main);
        }

        .revealed .percent {
            opacity: 1;
            transform: translateX(0);
        }

        .stats {
            margin-top: 35px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="streak-counter">🔥 Streak: <span id="streak-val">0</span></div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" id="theme-icon">
                <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <div class="container" id="game-container">
        <h1>Will You Press The Button?</h1>
        
        <div class="dilemma-box">
            <div class="dilemma-text" id="dilemma-text">Loading dilemma...</div>
        </div>
        
        <div class="options" id="options-container">
            <div class="btn-wrapper wrapper-yes">
                <button class="btn btn-yes" onclick="makeChoice('yes')">
                    <div class="btn-progress" id="progress-yes"></div>
                    <span>I will press it!</span>
                    <span class="percent" id="percent-yes">0%</span>
                </button>
            </div>
            
            <div class="btn-wrapper wrapper-no">
                <button class="btn btn-no" onclick="makeChoice('no')">
                    <div class="btn-progress" id="progress-no"></div>
                    <span>No way</span>
                    <span class="percent" id="percent-no">0%</span>
                </button>
            </div>
        </div>

        <div class="stats" id="counter">Question 1 of 5</div>
    </div>

    <script>
        const defaultDilemmas = [
            { text: "You can fly, BUT you can only hover 30 centimeters above the ground. Will you press it?", yes: 74, no: 26 },
            { text: "You know every language in the world, BUT you can only speak in Shrek's voice. Will you press it?", yes: 85, no: 15 },
            { text: "You become the world's best hacker, BUT circus music plays loudly in the background every time you touch a computer. Will you press it?", yes: 62, no: 38 },
            { text: "You always have the exact amount of cash in your pocket to buy anything you want, BUT you can never use the internet again. Will you press it?", yes: 21, no: 79 },
            { text: "You can teleport anywhere instantly, BUT you always arrive completely soaking wet and wearing a sock on your head. Will you press it?", yes: 91, no: 9 }
        ];

        let dilemmas = JSON.parse(localStorage.getItem('dilemma_stats')) || defaultDilemmas;
        let currentIndex = 0;
        let hasVoted = false;
        let streak = 0;

        const gameContainer = document.getElementById("game-container");
        const dilemmaTextEl = document.getElementById("dilemma-text");
        const percentYesEl = document.getElementById("percent-yes");
        const percentNoEl = document.getElementById("percent-no");
        const progressYes = document.getElementById("progress-yes");
        const progressNo = document.getElementById("progress-no");
        const optionsContainer = document.getElementById("options-container");
        const counterEl = document.getElementById("counter");
        const streakVal = document.getElementById("streak-val");
        const buttons = document.querySelectorAll(".btn");

        function playSound(result) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (result === 'win') {
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
                osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } else if (result === 'lose') {
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(180, ctx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
                osc.start();
                osc.stop(ctx.currentTime + 0.25);
            }
        }

        function spawnParticles() {
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.backgroundColor = `hsl(${Math.random() * 360}, 85%, 65%)`;
                const rect = gameContainer.getBoundingClientRect();
                particle.style.left = `${rect.width / 2}px`;
                particle.style.top = `${rect.height / 2}px`;
                gameContainer.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 6 + Math.random() * 12;
                const x = Math.cos(angle) * velocity * 18;
                const y = Math.sin(angle) * velocity * 18;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1.5)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 700 + Math.random() * 400,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                }).onfinish = () => particle.remove();
            }
        }

        function loadDilemma() {
            hasVoted = false;
            optionsContainer.classList.remove("revealed");
            buttons.forEach(btn => {
                btn.classList.remove("selected");
                btn.classList.remove("disabled");
            });
            
            progressYes.style.width = "0%";
            progressNo.style.width = "0%";

            gameContainer.classList.remove("animate-card");
            void gameContainer.offsetWidth; 
            gameContainer.classList.add("animate-card");

            const current = dilemmas[currentIndex];
            dilemmaTextEl.innerText = current.text;
            
            const totalVotes = current.yes + current.no;
            const yesPercentage = Math.round((current.yes / totalVotes) * 100);
            const noPercentage = 100 - yesPercentage;

            percentYesEl.innerText = yesPercentage + "%";
            percentNoEl.innerText = noPercentage + "%";
            
            counterEl.innerText = `Question ${currentIndex + 1} of ${dilemmas.length}`;
        }

        function makeChoice(choice) {
            if (hasVoted) return;
            hasVoted = true;

            optionsContainer.classList.add("revealed");
            buttons.forEach(btn => btn.classList.add("disabled"));

            if (choice === 'yes') {
                dilemmas[currentIndex].yes += 1;
            } else {
                dilemmas[currentIndex].no += 1;
            }

            localStorage.setItem('dilemma_stats', JSON.stringify(dilemmas));

            const current = dilemmas[currentIndex];
            const totalVotes = current.yes + current.no;
            const yesPercentage = Math.round((current.yes / totalVotes) * 100);
            const noPercentage = 100 - yesPercentage;

            let isMajority = false;

            if (choice === 'yes') {
                buttons[0].classList.add("selected");
                isMajority = yesPercentage >= noPercentage;
            } else {
                buttons[1].classList.add("selected");
                isMajority = noPercentage >= yesPercentage;
            }

            if (isMajority) {
                streak++;
                playSound('win');
                spawnParticles();
            } else {
                streak = 0;
                playSound('lose');
            }
            streakVal.innerText = streak;

            percentYesEl.innerText = yesPercentage + "%";
            percentNoEl.innerText = noPercentage + "%";

            setTimeout(() => {
                progressYes.style.width = yesPercentage + "%";
                progressNo.style.width = noPercentage + "%";
            }, 50);

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % dilemmas.length;
                loadDilemma();
            }, 2600);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            
            const icon = document.getElementById("theme-icon");
            if (newTheme === "dark") {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>';
            } else {
                icon.innerHTML = '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
            }
        }

        loadDilemma();
    </script>
</body>
</html>
