            --text-main: #f8fafc;
            --text-muted: #64748b;

            padding: 0;
            user-select: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

            width: 100%;
            max-width: 680px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 20px;
            z-index: 10;

            display: flex;
            gap: 10px;
            align-items: center;
        }

            align-items: center;

            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;

            font-weight: 700;
            color: var(--text-main);

            height: 42px;
        }

            width: 20px;
            height: 20px;
            fill: var(--text-main);
        }

        @keyframes cardPop {
            0% { transform: scale(0.96); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 20px 60px var(--shadow);
            padding: 45px 40px;
            width: 100%;
            max-width: 680px;
            text-align: center;
            position: relative;
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--box-bg);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;

            font-weight: 700;
            color: var(--text-muted);

            margin-bottom: 25px;

            background: var(--box-bg);
            border-radius: 24px;
            padding: 35px 25px;
            border: 2px dashed var(--box-border);

            min-height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 1.45rem;
            font-weight: 700;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-wrapper {
            position: relative;
            border-radius: 20px;
            padding-bottom: 6px;
        }

        .wrapper-yes { background: var(--accent-yes-dark); }
        .wrapper-no { background: var(--accent-no-dark); }

            width: 100%;
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            padding: 20px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transform: translateY(-6px);
            transition: transform 0.1s ease, background-color 0.2s ease, color 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            outline: none;
        }

        .btn-yes { background-color: var(--accent-yes); color: white; }
        .btn-no { background-color: var(--accent-no); color: white; }

        .btn-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: rgba(0, 0, 0, 0.08);
            transition: width 0.8s cubic-bezier(0.1, 0.8, 0.3, 1);
            z-index: 1;
        }

            background-color: rgba(255, 255, 255, 0.06);
        }

        .btn span {
            position: relative;
            z-index: 2;
        }

        .btn:active:not(.disabled) {
            transform: translateY(-2px);
        }

        .percent {
            font-size: 1.5rem;
            font-weight: 900;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .revealed .btn {
            pointer-events: none;
            transform: translateY(0);
        }
        
        .revealed .btn-wrapper {
            background: transparent;
        }

        .revealed .btn-yes { background-color: var(--btn-disabled-bg); color: var(--accent-yes); }
        .revealed .btn-no { background-color: var(--btn-disabled-bg); color: var(--accent-no); }

        .revealed .btn.selected {
            box-shadow: inset 0 0 0 4px var(--text-main);
        }

        .revealed .percent {
            opacity: 1;
            transform: translateX(0);
        }

        .stats {
            margin-top: 35px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }
    </style>
</head>

        let currentLang = localStorage.getItem('game_lang') || 'lv';
        let dilemmas = [];
        let currentIndex = 0;
        let hasVoted = false;
        let streak = 0;

        const gameContainer = document.getElementById("game-container");
        const dilemmaTextEl = document.getElementById("dilemma-text");
        const percentYesEl = document.getElementById("percent-yes");
        const percentNoEl = document.getElementById("percent-no");
        const progressYes = document.getElementById("progress-yes");
        const progressNo = document.getElementById("progress-no");
        const optionsContainer = document.getElementById("options-container");
        const counterEl = document.getElementById("counter");
        const streakVal = document.getElementById("streak-val");
        const buttons = document.querySelectorAll(".btn");
        const langBtn = document.getElementById("lang-btn");
        const topProgressBar = document.getElementById("top-progress");

        function initDilemmas() {
            const stored = localStorage.getItem(`dilemmas_${currentLang}`);
            if (stored) {
                try {
                    dilemmas = JSON.parse(stored);
                } catch(e) {
                    dilemmas = [];
                }
            } 
            
            if (!dilemmas || dilemmas.length === 0) {
                if (currentLang === 'lv') dilemmas = JSON.parse(JSON.stringify(defaultDilemmasLV));
                else if (currentLang === 'ru') dilemmas = JSON.parse(JSON.stringify(defaultDilemmasRU));
                else dilemmas = JSON.parse(JSON.stringify(defaultDilemmasEN));
            }

            const storedIndex = localStorage.getItem(`index_${currentLang}`);
            currentIndex = storedIndex ? parseInt(storedIndex, 10) : 0;
            if (isNaN(currentIndex) || currentIndex >= dilemmas.length || currentIndex < 0) {
                currentIndex = 0;
            }
        }

        function updateInterfaceStrings() {
            const strings = translations[currentLang];
            document.getElementById("game-title").innerText = strings.title;
            document.getElementById("text-yes").innerText = strings.yes;
            document.getElementById("text-no").innerText = strings.no;
            langBtn.innerText = currentLang.toUpperCase();
        }

        function playSound(result) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (result === 'win') {
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.frequency.setValueAtTime(280, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(150, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                }
            } catch(e){}
        }

        function animatePercentage(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                element.innerText = Math.floor(progress * (end - start) + start) + "%";
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function spawnParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.backgroundColor = `hsl(${Math.random() * 360}, 85%, 65%)`;
                const rect = gameContainer.getBoundingClientRect();
                particle.style.left = `${rect.width / 2}px`;
                particle.style.top = `${rect.height / 2}px`;
                gameContainer.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 4 + Math.random() * 8;
                const x = Math.cos(angle) * velocity * 15;
                const y = Math.sin(angle) * velocity * 15;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1.2)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 300,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                }).onfinish = () => particle.remove();
            }
        }

        function loadDilemma() {
            hasVoted = false;
            optionsContainer.classList.remove("revealed");
            
            buttons.forEach(btn => {
                btn.classList.remove("selected", "disabled");
            });
            
            progressYes.style.width = "0%";
            progressNo.style.width = "0%";
            percentYesEl.innerText = "0%";
            percentNoEl.innerText = "0%";

            if (!dilemmas[currentIndex]) {
                currentIndex = 0;
            }

            const current = dilemmas[currentIndex];
            dilemmaTextEl.innerText = current.text;
            
            const strings = translations[currentLang];
            counterEl.innerText = `${strings.question} ${currentIndex + 1} ${strings.of} ${dilemmas.length}`;

            const progressPct = ((currentIndex + 1) / dilemmas.length) * 100;
            topProgressBar.style.width = `${progressPct}%`;
        }

        function makeChoice(choice) {
            if (hasVoted) return;
            hasVoted = true;

            optionsContainer.classList.add("revealed");
            buttons.forEach(btn => btn.classList.add("disabled"));

            if (choice === 'yes') {
                dilemmas[currentIndex].yes += 1;
                buttons[0].classList.add("selected");
            } else {
                dilemmas[currentIndex].no += 1;
                buttons[1].classList.add("selected");
            }

            localStorage.setItem(`dilemmas_${currentLang}`, JSON.stringify(dilemmas));

            const current = dilemmas[currentIndex];
            const totalVotes = current.yes + current.no;
            const yesPercentage = Math.round((current.yes / totalVotes) * 100);
            const noPercentage = 100 - yesPercentage;

            let isMajority = (choice === 'yes' && yesPercentage >= noPercentage) || (choice === 'no' && noPercentage >= yesPercentage);

            if (isMajority) {
                streak++;
                playSound('win');
                spawnParticles();
            } else {
                streak = 0;
                playSound('lose');
            }
            streakVal.innerText = streak;

            animatePercentage(percentYesEl, 0, yesPercentage, 500);
            animatePercentage(percentNoEl, 0, noPercentage, 500);

            setTimeout(() => {
                progressYes.style.width = yesPercentage + "%";
                progressNo.style.width = noPercentage + "%";
            }, 50);

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % dilemmas.length;
                localStorage.setItem(`index_${currentLang}`, currentIndex);
                loadDilemma();
            }, 2600);
        }

        function toggleLanguage() {
            if (currentLang === 'lv') currentLang = 'en';
            else if (currentLang === 'en') currentLang = 'ru';
            else currentLang = 'lv';

            localStorage.setItem('game_lang', currentLang);
            
            streak = 0;
            streakVal.innerText = streak;
            
            updateInterfaceStrings();
            initDilemmas();
            loadDilemma();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            
            const icon = document.getElementById("theme-icon");
            if (newTheme === "dark") {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>';
            } else {
                icon.innerHTML = '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
            }
        }

        // Inicializācija
        updateInterfaceStrings();
        initDilemmas();
        loadDilemma();
    </script>
