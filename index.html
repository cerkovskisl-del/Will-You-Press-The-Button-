<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Press The Button? | Premium Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes cardPop {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .container {
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 50px 40px;
            width: 100%;
            max-width: 680px;
            text-align: center;
            position: relative;
        }

        .animate-card {
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .dilemma-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 30px;
            border: 2px dashed #e2e8f0;
            margin-bottom: 40px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dilemma-text {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.5;
            color: #2d3748;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 3D Pogu stils */
        .btn-wrapper {
            position: relative;
            border-radius: 20px;
            background: #cbd5e0;
        }

        .btn {
            width: 100%;
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 20px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transform: translateY(-6px);
            transition: transform 0.1s ease, background-color 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            outline: none;
        }

        /* Progress josla pogas iekšienē */
        .btn-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: rgba(0, 0, 0, 0.08);
            transition: width 0.8s cubic-bezier(0.1, 0.8, 0.3, 1);
            z-index: 1;
        }

        .btn span {
            position: relative;
            z-index: 2;
        }

        /* Krāsas un 3D dziļums */
        .wrapper-yes { background: #2f855a; }
        .btn-yes { background-color: #48bb78; color: white; }
        
        .wrapper-no { background: #c53030; }
        .btn-no { background-color: #f56565; color: white; }

        /* Aktīvais klikšķis */
        .btn:active:not(.disabled) {
            transform: translateY(-2px);
        }

        .percent {
            font-size: 1.5rem;
            font-weight: 900;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Stāvoklis pēc balsošanas */
        .revealed .btn {
            pointer-events: none;
            transform: translateY(0);
        }
        
        .revealed .btn-wrapper {
            background: #e2e8f0;
        }

        .revealed .btn-yes { background-color: #edf2f7; color: #2f855a; }
        .revealed .btn-no { background-color: #edf2f7; color: #c53030; }

        .revealed .btn.selected {
            box-shadow: inset 0 0 0 4px #1a1a1a;
        }

        .revealed .percent {
            opacity: 1;
            transform: translateX(0);
        }

        .stats {
            margin-top: 35px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #718096;
        }

        /* Konfeti daļiņas */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="container" id="game-container">
        <h1>Will You Press The Button?</h1>
        
        <div class="dilemma-box">
            <div class="dilemma-text" id="dilemma-text">Loading dilemma...</div>
        </div>
        
        <div class="options" id="options-container">
            <div class="btn-wrapper wrapper-yes">
                <button class="btn btn-yes" onclick="makeChoice('yes')">
                    <div class="btn-progress" id="progress-yes"></div>
                    <span>I will press it!</span>
                    <span class="percent" id="percent-yes">0%</span>
                </button>
            </div>
            
            <div class="btn-wrapper wrapper-no">
                <button class="btn btn-no" onclick="makeChoice('no')">
                    <div class="btn-progress" id="progress-no"></div>
                    <span>No way</span>
                    <span class="percent" id="percent-no">0%</span>
                </button>
            </div>
        </div>

        <div class="stats" id="counter">Question 1 of 5</div>
    </div>

    <script>
        const dilemmas = [
            { text: "You can fly, BUT you can only hover 30 centimeters above the ground. Will you press it?", yes: 74, no: 26 },
            { text: "You know every language in the world, BUT you can only speak in Shrek's voice. Will you press it?", yes: 85, no: 15 },
            { text: "You become the world's best hacker, BUT circus music plays loudly in the background every time you touch a computer. Will you press it?", yes: 62, no: 38 },
            { text: "You always have the exact amount of cash in your pocket to buy anything you want, BUT you can never use the internet again. Will you press it?", yes: 21, no: 79 },
            { text: "You can teleport anywhere instantly, BUT you always arrive completely soaking wet and wearing a sock on your head. Will you press it?", yes: 91, no: 9 }
        ];

        let currentIndex = 0;
        let hasVoted = false;

        const gameContainer = document.getElementById("game-container");
        const dilemmaTextEl = document.getElementById("dilemma-text");
        const percentYesEl = document.getElementById("percent-yes");
        const percentNoEl = document.getElementById("percent-no");
        const progressYes = document.getElementById("progress-yes");
        const progressNo = document.getElementById("progress-no");
        const optionsContainer = document.getElementById("options-container");
        const counterEl = document.getElementById("counter");
        const buttons = document.querySelectorAll(".btn");

        // Mākslīgā skaņas efekta ģenerators (Nav vajadzīgi audio faili!)
        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'click') {
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
                osc.start();
                osc.stop(ctx.currentTime + 0.05);
            }
        }

        // Vizuālais konfeti efekts svinībām
        function spawnParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
                particle.style.left = '50%';
                particle.style.top = '50%';
                gameContainer.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 10;
                const x = Math.cos(angle) * velocity * 15;
                const y = Math.sin(angle) * velocity * 15;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                }).onfinish = () => particle.remove();
            }
        }

        function loadDilemma() {
            hasVoted = false;
            optionsContainer.classList.remove("revealed");
            buttons.forEach(btn => {
                btn.classList.remove("selected");
                btn.classList.remove("disabled");
            });
            
            progressYes.style.width = "0%";
            progressNo.style.width = "0%";

            gameContainer.classList.remove("animate-card");
            void gameContainer.offsetWidth; 
            gameContainer.add = gameContainer.classList.add("animate-card");

            const current = dilemmas[currentIndex];
            dilemmaTextEl.innerText = current.text;
            percentYesEl.innerText = current.yes + "%";
            percentNoEl.innerText = current.no + "%";
            
            counterEl.innerText = `Question ${currentIndex + 1} of ${dilemmas.length}`;
        }

        function makeChoice(choice) {
            if (hasVoted) return;
            hasVoted = true;

            playSound('click');
            optionsContainer.classList.add("revealed");
            buttons.forEach(btn => btn.classList.add("disabled"));

            const current = dilemmas[currentIndex];

            if (choice === 'yes') {
                buttons[0].classList.add("selected");
                if (current.yes > current.no) spawnParticles();
            } else {
                buttons[1].classList.add("selected");
                if (current.no > current.yes) spawnParticles();
            }

            // Animē stabiņu aizpildīšanos
            setTimeout(() => {
                progressYes.style.width = current.yes + "%";
                progressNo.style.width = current.no + "%";
            }, 50);

            // Automātiska pāreja uz nākamo jautājumu pēc 2.5 sekundēm
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % dilemmas.length;
                loadDilemma();
            }, 2500);
        }

        loadDilemma();
    </script>
</body>
</html>
